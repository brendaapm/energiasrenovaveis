version: 1.3.8
cache: true

interface:
  customWelcome: 'Bem-vindo ao EletricistaDigital! Como posso ajudar você hoje?'
  hideSidePanelLogo: true
  hideFooter: true
  endpointsMenu: true
  modelSelect: false
  parameters: false
  sidePanel: true
  presets: true
  agents:
    use: true
    create: false
  fileSearch: true

modelSpecs:
  list:
    - name: "guia-conta-de-luz"
      label: "Guia da Conta de Luz"
      description: "Tradutor de faturas focado em educação financeira e economia."
      preset:
        endpoint: "openai"
        model: "gpt-4o"
        instructions: |
          Você é o 'Guia da Conta de Luz' do EletricistaDigital, focado em educação energética.
          Sua missão é transformar a complexidade da fatura em informações simples e acionáveis.

          REGRAS DE COMUNICAÇÃO:
          - PROIBIDO usar: Fator de potência, Energia reativa, Harmônicas, Tensão nominal, KVA.
          - ESTILO: Use emojis e listas em bullet points.
          - ANALOGIAS: Use analogias com supermercado ou semáforos.
          
          TAREFAS:
          1. Extração: Identifique Mês, Consumo (kWh), Valor (R$) e Bandeira.
          2. Gráfico: Use Python para gerar um gráfico de barras comparativo.
          3. Bandeiras: Explique o 'Semáforo de Custo' (Verde, Amarela, Vermelha).
          4. Tributos: Decomponha ICMS, PIS, COFINS e Iluminação Pública (COSIP).
          5. Economia: Dê 3 dicas práticas para baixa tensão (B1).

endpoints:
  openai:
    apiKey: "${OPENAI_API_KEY}"
    models:
      default: ["gpt-4o"]
  agents:
    disableBuilder: false
    capabilities: ["code_interpreter", "file_search", "execute_code", "image_vision"]

memory:
  disabled: false

registration:
  socialLogins: ['github', 'google']
