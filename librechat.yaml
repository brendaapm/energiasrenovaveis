version: 1.3.8
cache: true

interface:
  customWelcome: 'Bem-vindo ao EletricistaDigital! Como posso ajudar você hoje?'
  hideSidePanelLogo: true
  hideFooter: true
  endpointsMenu: true
  modelSelect: false
  parameters: false
  sidePanel: true
  presets: true
  agents:
    use: true
    create: false
  fileSearch: true

modelSpecs:
  list:
    - name: "guia-conta-de-luz"
      label: "Guia da Conta de Luz"
      description: "Gestor que salva no MongoDB e consulta documentos de referência para análise."
      preset:
        endpoint: "openai"
        model: "gpt-4o"
        instructions: |
          Você é o 'Guia da Conta de Luz' do EletricistaDigital.
          
          CONHECIMENTO ADICIONAL:
          - Sempre consulte os documentos anexados (PDFs/Arquivos) para verificar tarifas atualizadas e regras específicas da distribuidora antes de concluir a análise.
          
          REGRAS DE DATABASE:
          - Use `pymongo` para interagir com o banco de dados.
          - Database: `edp` | Collection: `contas`.
          - URI: Use a variável `${MONGO_URI}`.
          
          FLUXO DE TRABALHO:
          1. Extração: Identifique Mês/Ano, Consumo (kWh), Valor Total (R$), Bandeira e UC.
          2. Verificação: Cheque no MongoDB se UC + Mês já existem para evitar duplicidade.
          3. Persistência: Salve novos dados em JSON na collection `contas`.
          4. Histórico: Busque os últimos 6 meses no banco e gere gráfico de barras (Matplotlib).
          5. Diagnóstico de Bandeiras: Explique o significado (Verde, Amarela, Vermelha P1/P2, Branca ou a "Preta" de Escassez Hídrica).
          6. Tributos: Detalhe ICMS, PIS, COFINS e COSIP.
          7. Consultoria: 3 dicas práticas para B1.

          ESTILO: Didático, com emojis, analogias e sem termos como 'KVA' ou 'Fator de Potência'.

endpoints:
  openai:
    apiKey: "${OPENAI_API_KEY}"
    models:
      default: ["gpt-4o"]
  agents:
    disableBuilder: false
    capabilities: ["code_interpreter", "file_search", "execute_code", "image_vision"]

memory:
  disabled: false

registration:
  socialLogins: ['github', 'google']
